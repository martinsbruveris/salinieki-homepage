{{ $slides := .Site.Params.heroSlides }}
{{ $slideSeconds := 6 }}
<section class="hero" data-slide-interval="{{ mul $slideSeconds 1000 }}">
  <div class="hero-slides" aria-hidden="true">
    {{ range $i, $s := $slides }}
      <div class="hero-slide{{ if eq $i 0 }} is-active{{ end }}" style="background-image: linear-gradient(rgba(4,35,71,0.45), rgba(4,35,71,0.65)), url('{{ $s.image | relURL }}');"></div>
    {{ end }}
  </div>
  <div class="container hero-inner">
    <p class="hero-eyebrow">Londonas Tautas Deju Kopa</p>
    <h1 class="hero-title">Salinieki</h1>
    <p class="hero-tagline">Latviešu tautas deju kopa Londonā kopš 2012. gada</p>
    <div class="hero-cta">
      <a class="btn btn-primary" href="{{ "/par-mums/" | relURL }}">Par mums</a>
      <a class="btn btn-ghost" href="{{ "/kontakti/" | relURL }}">Nāc dejot!</a>
    </div>
  </div>
</section>
